<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Feel Free Spa | Link Generator</title>
  <style>
    :root {
      --ink: #1d1a17;
      --muted: #6e655d;
      --line: #dfd7cf;
      --paper: #fffaf4;
      --brand: #137c72;
      --brand-dark: #0d5d55;
      --rose: #b74d66;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(120deg, rgba(19, 124, 114, 0.12), transparent 34%),
        linear-gradient(240deg, rgba(183, 77, 102, 0.10), transparent 38%),
        var(--paper);
      font-family: Arial, Helvetica, sans-serif;
    }

    main {
      width: min(560px, calc(100% - 24px));
      margin: 0 auto;
      padding: 36px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }

    .mark {
      display: grid;
      width: 44px;
      height: 44px;
      place-items: center;
      border-radius: 50%;
      color: #fff;
      background: linear-gradient(145deg, var(--brand), var(--rose));
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
    }

    .sub {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    form,
    .result {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 16px 44px rgba(45, 36, 26, 0.12);
    }

    label {
      display: grid;
      gap: 7px;
      margin-bottom: 14px;
      font-size: 12px;
      font-weight: 700;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px;
      color: var(--ink);
      font: inherit;
      outline: none;
    }

    input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(19, 124, 114, 0.14);
    }

    button,
    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 46px;
      border: 0;
      border-radius: 6px;
      padding: 12px 14px;
      color: #fff;
      background: var(--brand);
      font: inherit;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }

    button:hover,
    a.button:hover { background: var(--brand-dark); }

    .result {
      display: none;
      margin-top: 16px;
    }

    .result.is-open { display: block; }

    .url {
      width: 100%;
      margin: 8px 0 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px;
      background: #fff;
      color: #2d2721;
      font-size: 13px;
      line-height: 1.4;
      overflow-wrap: anywhere;
      user-select: text;
    }

    .status {
      min-height: 20px;
      margin: 12px 0 0;
      color: var(--rose);
      font-size: 13px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <div class="brand">
      <div class="mark">FF</div>
      <div>
        <h1>Private gallery link</h1>
        <p class="sub">Creates a customer link that expires in 3 minutes.</p>
      </div>
    </div>

    <form id="linkForm" autocomplete="off">
      <label>
        Admin PIN
        <input id="pin" type="password" placeholder="Enter admin PIN" required>
      </label>
      <label>
        Customer name
        <input id="name" type="text" placeholder="Enter customer name" required>
      </label>
      <label>
        Customer WhatsApp number
        <input id="phone" type="tel" placeholder="Enter customer number" inputmode="tel" required>
      </label>
      <button type="submit">Create 3-minute link</button>
      <p class="status" id="status"></p>
    </form>

    <section class="result" id="result">
      <strong>Customer link</strong>
      <div class="url" id="url"></div>
      <button type="button" id="copyButton">Copy link</button>
    </section>
  </main>

  <script>
    var form = document.getElementById("linkForm");
    var statusEl = document.getElementById("status");
    var result = document.getElementById("result");
    var urlEl = document.getElementById("url");
    var copyButton = document.getElementById("copyButton");

    form.addEventListener("submit", async function (event) {
      event.preventDefault();
      statusEl.textContent = "Creating link...";
      result.classList.remove("is-open");

      try {
        var response = await fetch("/.netlify/functions/create-link", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            pin: document.getElementById("pin").value,
            name: document.getElementById("name").value,
            phone: document.getElementById("phone").value
          })
        });

        var data = await response.json();
        if (!response.ok) throw new Error(data.error || "Could not create link");

        urlEl.textContent = data.url;
        result.classList.add("is-open");
        statusEl.textContent = "Link ready. It expires in 3 minutes.";
      } catch (error) {
        statusEl.textContent = error.message;
      }
    });

    copyButton.addEventListener("click", async function () {
      await navigator.clipboard.writeText(urlEl.textContent);
      copyButton.textContent = "Copied";
      setTimeout(function () {
        copyButton.textContent = "Copy link";
      }, 1200);
    });
  </script>
</body>
</html>
